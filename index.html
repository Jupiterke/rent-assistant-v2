<!DOCTYPE html>
<html>
<head>
  <title>Rent Assistant - Manage Rent Easily</title>
  <meta name="description" content="Track tenants, rent payments, and due dates easily.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <h1>🏠 Rent Assistant</h1>
  <p>Simple rent tracking system</p>

  <input id="name" placeholder="Tenant Name">
  <input id="property" placeholder="Property Name">
  <input id="rent" type="number" placeholder="Rent Amount">
  <input id="dueDate" type="date">

  <button onclick="addTenant()">Add Tenant</button>

  <ul id="list"></ul>

  <script src="app.js"></script>
</body>
</html>
